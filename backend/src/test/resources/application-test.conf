# ============================================================
# application-test.conf — Test overrides
#
# Loaded in addition to application.conf for test runs.
# Testcontainers overrides the DB URL at runtime via system
# properties, so the values here are just sensible fallbacks.
# ============================================================

include "application.conf"

myassistant {

  server {
    host = "127.0.0.1"
    port = 0       # random free port for tests
  }

  database {
    url      = "jdbc:postgresql://localhost:5432/myassistant_test"
    url      = ${?TEST_DB_URL}
    user     = "test"
    user     = ${?TEST_DB_USER}
    password = "test"
    password = ${?TEST_DB_PASSWORD}
    poolSize = 2
  }

  auth {
    token = "test-token"
  }

  fileStorage {
    basePath = "/tmp/myassistant-test/files"
  }
}
