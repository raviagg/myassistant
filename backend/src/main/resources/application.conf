# ============================================================
# application.conf — Personal Assistant Backend
#
# HOCON configuration for all subsystems.
# Environment variable overrides are provided for every
# sensitive or deployment-specific value.
# ============================================================

myassistant {

  # ── HTTP server ─────────────────────────────────────────────
  server {
    host = "0.0.0.0"
    host = ${?SERVER_HOST}

    port = 8080
    port = ${?SERVER_PORT}
  }

  # ── PostgreSQL (HikariCP pool) ───────────────────────────────
  database {
    url      = "jdbc:postgresql://localhost:5432/myassistant"
    url      = ${?DB_URL}

    user     = "myassistant"
    user     = ${?DB_USER}

    password = "changeme"
    password = ${?DB_PASSWORD}

    # HikariCP pool settings
    poolSize    = 10
    poolSize    = ${?DB_POOL_SIZE}

    # Connection timeout in milliseconds
    connectionTimeout = 30000
    connectionTimeout = ${?DB_CONNECTION_TIMEOUT}

    # Idle timeout in milliseconds (10 minutes)
    idleTimeout = 600000
    idleTimeout = ${?DB_IDLE_TIMEOUT}

    # Maximum lifetime of a connection in milliseconds (30 minutes)
    maxLifetime = 1800000
    maxLifetime = ${?DB_MAX_LIFETIME}
  }

  # ── Auth ─────────────────────────────────────────────────────
  auth {
    # Static bearer token for service-to-service auth.
    # In production replace with a proper JWT/OIDC solution.
    token = "dev-token-change-me-in-production"
    token = ${?AUTH_TOKEN}
  }

  # ── File storage ─────────────────────────────────────────────
  fileStorage {
    # Base path where uploaded files are stored.
    # Use an S3-compatible path (s3://bucket/prefix) in production.
    basePath = "/tmp/myassistant/files"
    basePath = ${?FILE_STORAGE_BASE_PATH}
  }
}
